<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Loss of Signal</title>
  
  <script>
    // The Redirect Logic
    const currentPath = window.location.pathname.toLowerCase();
    if (currentPath === '/floaties!' || currentPath === '/floaties%21') {
      window.location.replace('/floaties!');
    }
  </script>

  <style>
    /* 1. Core Reset & Typography */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #111;
      font-family: "Courier New", Courier, monospace;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 2. The CRT Monitor Glass Effect */
    .crt-screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      /* Simulates the rounded corners and inner shadow of a tube TV */
      box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
      border-radius: 10px;
    }

    /* 3. SMPTE Bars with V-Sync Rolling Animation */
    .smpte-bars {
      position: absolute;
      top: -10%;
      left: 0;
      width: 100%;
      height: 120%; /* Extra height for the rolling animation */
      background: linear-gradient(to right, 
        #bfbfbf 0%, #bfbfbf 14.28%, 
        #c0c000 14.28%, #c0c000 28.56%, 
        #00c0c0 28.56%, #00c0c0 42.84%, 
        #00c000 42.84%, #00c000 57.12%, 
        #c000c0 57.12%, #c000c0 71.4%, 
        #c00000 71.4%, #c00000 85.68%, 
        #0000c0 85.68%, #0000c0 100%
      );
      z-index: 1;
      animation: vsync-roll 8s infinite linear;
    }

    /* 4. VHS Tracking Noise overlay */
    .tracking-noise {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        transparent 0,
        transparent 50%,
        rgba(0, 0, 0, 0.15) 50%,
        rgba(0, 0, 0, 0.15) 100%
      );
      background-size: 100% 4px;
      z-index: 2;
      pointer-events: none;
      animation: tracking-jitter 0.2s infinite;
    }

    /* 5. Center OSD (On-Screen Display) Error */
    .error-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 4;
      text-align: center;
      width: 100%;
    }

    .osd-box {
      background-color: rgba(0, 0, 0, 0.9);
      border: 3px solid #fff;
      padding: 40px 60px;
      display: inline-block;
      box-shadow: 0 0 30px rgba(0,0,0,1);
      mix-blend-mode: hard-light; /* Makes it blend heavily with the bars behind it */
    }

    h1.glitch {
      color: white;
      font-size: 5rem;
      margin: 0 0 10px 0;
      font-weight: bold;
      letter-spacing: 5px;
      position: relative;
      text-shadow: 
        0.05em 0 0 rgba(255, 0, 0, 0.8),
        -0.025em -0.05em 0 rgba(0, 255, 0, 0.8),
        0.025em 0.05em 0 rgba(0, 0, 255, 0.8);
      animation: glitch-skew 1.5s infinite linear alternate-reverse;
    }

    p.subtitle {
      color: #00ff00;
      font-size: 1.5rem;
      margin: 0 0 30px 0;
      text-transform: uppercase;
      letter-spacing: 2px;
      animation: blink 2s infinite;
    }

    a.btn {
      color: #000;
      background-color: #fff;
      text-decoration: none;
      padding: 15px 30px;
      text-transform: uppercase;
      font-size: 1.2rem;
      font-weight: bold;
      transition: all 0.2s;
      border: 2px solid #fff;
    }

    a.btn:hover {
      background-color: transparent;
      color: #fff;
      box-shadow: 0 0 15px #fff;
    }

    /* 6. Fake Diagnostic Terminal Boot Sequence */
    .terminal-logs {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 5;
      color: #00ff00;
      font-size: 0.9rem;
      text-align: left;
      opacity: 0.8;
      pointer-events: none;
    }

    .log-line {
      overflow: hidden;
      white-space: nowrap;
      margin: 5px 0;
      width: 0;
      border-right: 2px solid transparent;
    }

    /* Staggered Typewriter Animation for Logs */
    .log-1 { animation: typing 1s steps(40, end) forwards; animation-delay: 0.5s; }
    .log-2 { animation: typing 1s steps(40, end) forwards; animation-delay: 1.5s; }
    .log-3 { animation: typing 1s steps(40, end) forwards; animation-delay: 2.5s; }
    .log-4 { animation: typing 1s steps(40, end) forwards; animation-delay: 3.5s; }
    .log-5 { animation: typing 1s steps(40, end) forwards, blink-cursor 0.7s step-end infinite; animation-delay: 4.5s; border-right-color: #00ff00; }

    /* Animations */
    @keyframes vsync-roll {
      0% { transform: translateY(0); }
      100% { transform: translateY(-10%); }
    }

    @keyframes tracking-jitter {
      0% { transform: translateY(0px); }
      50% { transform: translateY(2px); }
      100% { transform: translateY(-1px); }
    }

    @keyframes glitch-skew {
      0% { transform: skew(0deg); text-shadow: 3px 0 0 rgba(255,0,0,0.7), -3px 0 0 rgba(0,0,255,0.7); }
      20% { transform: skew(-5deg); text-shadow: -3px 0 0 rgba(255,0,0,0.7), 3px 0 0 rgba(0,0,255,0.7); }
      21% { transform: skew(0deg); }
      40% { transform: skew(5deg); }
      41% { transform: skew(0deg); text-shadow: 0 0 0 transparent; }
      100% { transform: skew(0deg); }
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }

    @keyframes blink-cursor {
      from, to { border-color: transparent }
      50% { border-color: #00ff00 }
    }
  </style>
</head>
<body>

  <div class="crt-screen">
    <div class="smpte-bars"></div>
    <div class="tracking-noise"></div>

    <div class="error-container">
      <div class="osd-box">
        <h1 class="glitch">NO SIGNAL</h1>
        <p class="subtitle">ERR 404: ROUTING FAULT</p>
        <a href="/" class="btn">Patch to Main</a>
      </div>
    </div>

    <div class="terminal-logs">
      <div class="log-line log-1">> ping databoy ... TIMEOUT</div>
      <div class="log-line log-2">> ATEM Software Control ... OFFLINE</div>
      <div class="log-line log-3">> QLab OSC port 53000 ... NO RESPONSE</div>
      <div class="log-line log-4">> Dante Controller sync ... FAILED</div>
      <div class="log-line log-5">> FATAL: Page /floaties! missing from ProPresenter playlist. _</div>
    </div>
  </div>

</body>
</html>
