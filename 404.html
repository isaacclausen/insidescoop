<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>404 - Incorrect</title>
  
  <script>
    // The Sacred Redirect Logic (Preserved)
    const currentPath = window.location.pathname.toLowerCase();
    if (currentPath === '/floaties!' || currentPath === '/floaties%21') {
      window.location.replace('/floaties!');
    }
  </script>

  <style>
    /* 1. Core Reset & Water Environment */
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden;
      background-color: #00a8ff;
      /* Animated CSS Water Background */
      background-image: 
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.2) 0%, transparent 60%),
        linear-gradient(45deg, #0097e6 25%, transparent 25%, transparent 75%, #0097e6 75%, #0097e6), 
        linear-gradient(45deg, #0097e6 25%, transparent 25%, transparent 75%, #0097e6 75%, #0097e6);
      background-size: 100% 100%, 100px 100px, 100px 100px;
      background-position: 0 0, 0 0, 50px 50px;
      animation: waterFlow 10s linear infinite;
      font-family: 'Arial Black', Impact, sans-serif;
      touch-action: none; /* Prevents mobile scrolling so touch effects work perfectly */
    }

    @keyframes waterFlow {
      0% { background-position: 0 0, 0 0, 50px 50px; }
      100% { background-position: 0 0, 100px 100px, 150px 150px; }
    }

    /* 2. The Canvas Layer */
    canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      display: block;
    }

    /* 3. The "That is incorrect." Message Layer */
    .message-container {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-align: center;
      pointer-events: none; /* Lets you click the canvas through the text */
      width: 100%;
    }

    h1 {
      font-size: clamp(3rem, 10vw, 8rem);
      margin: 0;
      color: #ffd32a;
      text-transform: uppercase;
      -webkit-text-stroke: 0.05em #ff3f34;
      text-shadow: 
        0.1em 0.1em 0 #ff3f34,
        0.2em 0.2em 0.25em rgba(0,0,0,0.5);
      animation: bouncyFloat 2s ease-in-out infinite alternate, squeeze 0.5s infinite alternate;
    }

    @keyframes bouncyFloat {
      0% { transform: translateY(-20px) rotate(-2deg); }
      100% { transform: translateY(20px) rotate(2deg); }
    }
    
    @keyframes squeeze {
      0% { transform: scaleX(1) scaleY(1) translateY(0); }
      100% { transform: scaleX(1.05) scaleY(0.95) translateY(0); }
    }

    .miller {
      opacity: 0;
      animation: fadeIn 2s ease-in forwards;
      animation-delay: 5s;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- The Physics Engine Canvas -->
  <canvas id="duckPond"></canvas>

  <!-- The Massive Message -->
  <div class="message-container">
    <h1>That is incorrect<span class="miller">, Miller</span></h1>
  </div>

  <script>
    /**
     * UNHINGED RUBBER DUCK PHYSICS ENGINE
     */
    const canvas = document.getElementById('duckPond');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    const ducks = [];
    const particles = [];
    
    // Preload custom images
    const duckImages = [
      'duckshell.png', 'duckdead.png', 'ducksnow.png', 'truck.png', 'booker.png',
      'drivethrough.png', 'duckter.png', 'duckspy.png', 'duckchips.png', 'ducklazy.png',
      'stopsign.png', 'lamp.png', 'pond.png', 'tree.png', 'duckskate.png',
      'duckstronaut.png', 'duckart.png', 'duckbooks.png', 'duckcook.png', 'mailbox.png',
      'bike.png', 'birdhouse.png', 'campfire.png', 'phonebooth.png', 'duckbuild.png',
      'duckgarden.png', 'ducksci.png', 'ducksinger.png', 'duckfire.png'
    ].map(src => {
      const img = new Image();
      img.src = 'ducks/' + src;
      return img;
    });
    
    // Image pool to guarantee variety before repeating
    let imagePool = [];
    function getNextImage() {
      if (imagePool.length === 0) {
        imagePool = [...duckImages];
        // Shuffle the pool
        for (let i = imagePool.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [imagePool[i], imagePool[j]] = [imagePool[j], imagePool[i]];
        }
      }
      return imagePool.pop();
    }

    // Track mouse/touch for interactive forces
    let pointer = { x: -1000, y: -1000, isDown: false };

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      ctx.scale(dpr, dpr);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
    }
    window.addEventListener('resize', resize);
    resize();

    // Input Tracking (Mouse & Touch)
    window.addEventListener('mousemove', e => { pointer.x = e.clientX; pointer.y = e.clientY; });
    window.addEventListener('touchmove', e => { pointer.x = e.touches[0].clientX; pointer.y = e.touches[0].clientY; });
    window.addEventListener('mouseleave', () => { pointer.x = -1000; pointer.y = -1000; });
    window.addEventListener('touchend', () => { pointer.x = -1000; pointer.y = -1000; pointer.isDown = false; });
    
    // The "Explosion" effect on click/tap
    function explode(x, y) {
      // Spawn ducks blasting outward
      for (let i = 0; i < 20; i++) {
        particles.push(new DuckParticle(x, y));
      }
      // Spawn bubbles
      for (let i = 0; i < 30; i++) {
        particles.push(new Bubble(x, y));
      }
    }
    window.addEventListener('mousedown', e => { pointer.isDown = true; explode(e.clientX, e.clientY); });
    window.addEventListener('touchstart', e => { pointer.isDown = true; explode(e.touches[0].clientX, e.touches[0].clientY); });
    window.addEventListener('mouseup', () => pointer.isDown = false);

    // 1. The Background Bouncing Ducks
    class BouncingDuck {
      constructor() {
        this.size = Math.random() * 40 + 30;
        this.x = Math.random() * (width - this.size);
        this.y = Math.random() * (height - this.size);
        this.vx = (Math.random() - 0.5) * 6;
        this.vy = (Math.random() - 0.5) * 6;
        this.angle = 0;
        this.spin = (Math.random() - 0.5) * 0.1;
        this.img = getNextImage();
      }
      update() {
        // Move
        this.x += this.vx;
        this.y += this.vy;
        this.angle += this.spin;

        // Bounce off walls with 20% decay
        const radius = this.size / 2;
        if (this.x - radius < 0) { this.x = radius; this.vx *= -0.8; }
        else if (this.x + radius > width) { this.x = width - radius; this.vx *= -0.8; }
        
        if (this.y - radius < 0) { this.y = radius; this.vy *= -0.8; }
        else if (this.y + radius > height) { this.y = height - radius; this.vy *= -0.8; }

        // Bounce off other ducks with 20% decay
        for (let i = 0; i < ducks.length; i++) {
          const other = ducks[i];
          if (other === this) continue;

          const dx = this.x - other.x;
          const dy = this.y - other.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const minDist = radius + (other.size / 2); // Combined object bounds

          if (dist < minDist && dist > 0) {
            // Resolve visual overlap so they don't get stuck together
            const overlap = minDist - dist;
            const nx = dx / dist;
            const ny = dy / dist;

            this.x += nx * (overlap / 2);
            this.y += ny * (overlap / 2);
            other.x -= nx * (overlap / 2);
            other.y -= ny * (overlap / 2);

            // Calculate relative velocity
            const rvx = this.vx - other.vx;
            const rvy = this.vy - other.vy;
            const velAlongNormal = rvx * nx + rvy * ny;

            // Apply physics impulse if they are moving towards each other
            if (velAlongNormal < 0) {
              const restitution = 0.8; // 0.8 = 20% speed lost in collision
              const impulse = -(1 + restitution) * velAlongNormal / 2; // Assuming equal mass

              const impulseX = nx * impulse;
              const impulseY = ny * impulse;

              this.vx += impulseX;
              this.vy += impulseY;
              other.vx -= impulseX;
              other.vy -= impulseY;
            }
          }
        }

        // Interactive: Run away from the mouse/touch pointer
        const dx = this.x - pointer.x;
        const dy = this.y - pointer.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < 150) {
          const force = (150 - dist) / 150;
          this.vx += (dx / dist) * force * 2;
          this.vy += (dy / dist) * force * 2;
          this.spin += (Math.random() - 0.5) * 0.2; // Spin wildly when scared
        }

        // Random spaz to keep movement energetic
        if (Math.random() < 0.001) {
          this.vx += (Math.random() - 0.5) * 15;
          this.vy += (Math.random() - 0.5) * 15;
          this.spin += (Math.random() - 0.5) * 0.4;
        }

        this.spin *= 0.95;
        
        // Cap max speed so they don't accelerate infinitely
        const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
        if (speed > 15) {
          this.vx = (this.vx / speed) * 15;
          this.vy = (this.vy / speed) * 15;
        }
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        if (this.img.complete && this.img.naturalWidth !== 0) {
          const aspect = this.img.naturalWidth / this.img.naturalHeight;
          let w = this.size;
          let h = this.size;
          if (aspect > 1) {
            h = this.size / aspect; // Wider than tall
          } else {
            w = this.size * aspect; // Taller than wide
          }
          ctx.drawImage(this.img, -w / 2, -h / 2, w, h);
        }
        ctx.restore();
      }
    }

    // 2. Physics Ducks (Spawned on Click)
    class DuckParticle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 20; // Explosive speed
        this.vy = (Math.random() - 1) * 20; // Blast upwards mostly
        this.size = Math.random() * 30 + 20;
        this.angle = Math.random() * Math.PI * 2;
        this.spin = (Math.random() - 0.5) * 0.5;
        this.gravity = 0.5;
        this.life = 1.0;
        this.decay = Math.random() * 0.02 + 0.01;
        this.img = getNextImage();
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += this.gravity; // Fall down
        this.angle += this.spin;
        this.spin *= 0.95;
        this.life -= this.decay;
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        const currentSize = this.size * Math.max(0, this.life);
        if (this.img.complete && this.img.naturalWidth !== 0) {
          const aspect = this.img.naturalWidth / this.img.naturalHeight;
          let w = currentSize;
          let h = currentSize;
          if (aspect > 1) {
            h = currentSize / aspect;
          } else {
            w = currentSize * aspect;
          }
          ctx.drawImage(this.img, -w / 2, -h / 2, w, h);
        }
        ctx.restore();
      }
    }

    // 3. Bubbles (Spawned on Mouse move and Click)
    class Bubble {
      constructor(x, y) {
        this.x = x + (Math.random() - 0.5) * 40;
        this.y = y + (Math.random() - 0.5) * 40;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = Math.random() * -3 - 1; // Float up
        this.size = Math.random() * 15 + 5;
        this.life = 1.0;
        this.decay = Math.random() * 0.03 + 0.01;
        this.wobble = Math.random() * Math.PI * 2;
      }
      update() {
        this.wobble += 0.1;
        this.x += this.vx + Math.sin(this.wobble) * 1;
        this.y += this.vy;
        this.size += 0.2; // Grow as they float
        this.life -= this.decay;
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
        ctx.lineWidth = 2;
        ctx.stroke();
        // Inner highlight
        ctx.beginPath();
        ctx.arc(this.x - this.size*0.3, this.y - this.size*0.3, this.size*0.2, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
        ctx.fill();
        ctx.restore();
      }
    }

    // Initialize background ducks based on screen size
    const duckCount = Math.min(Math.floor((window.innerWidth * window.innerHeight) / 15000), 100);
    for (let i = 0; i < duckCount; i++) {
      ducks.push(new BouncingDuck());
    }

    // The Master Animation Loop
    function animate() {
      ctx.clearRect(0, 0, width, height);

      // Spawn trail bubbles if moving
      if (pointer.x !== -1000 && Math.random() > 0.5) {
        particles.push(new Bubble(pointer.x, pointer.y));
      }

      // Draw Background Ducks
      ducks.forEach(duck => {
        duck.update();
        duck.draw();
      });

      // Draw Physics Particles (Explosions & Trails)
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.update();
        p.draw();
        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }

      requestAnimationFrame(animate);
    }

    // Start the chaos
    animate();
  </script>
</body>
</html>
